# CHAPTER 1 — TENSORS

[[exercises]]
name = "tensors1"
dir = "01_tensors"
test = true
hint = """
Rank is part of a Burn tensor's type: `Tensor<B, 1>` (one axis) and
`Tensor<B, 2>` (two axes) are different, incompatible types.

`one_row` promises to return a `Tensor<Backend, 1>`, but the body builds a
`Tensor<Backend, 2>`. The five numbers are a single row — one axis of length 5
— so the tensor is rank 1. Change the `2` in the annotation to a `1`.

Compare with `learning-burn/book-tests/examples/ch1_01_rank_vs_shape.rs`,
which makes exactly this point."""
