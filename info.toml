Welcome to Burnlings — small exercises to get you writing deep-learning code
in Rust with the Burn framework, the same way Rustlings teaches Rust.

Each exercise contains a compiler or logic error. Your job is to fix it.
Remove the `// I AM NOT DONE` comment once you think you've solved one.

If you're stuck, read the `hint` for that exercise below. The exercises follow
the chapters of the *Learning Burn* book."""

